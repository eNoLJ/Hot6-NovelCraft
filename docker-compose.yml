version: '3.8'

services:
  # --------------------------
  # Redis Master (Port: 6379)
  # --------------------------
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --protected-mode no
    networks:
      - redis-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10

  # --------------------------
  # Redis Slave 1 (Port: 6380)
  # --------------------------
  redis-slave-1:
    image: redis:7-alpine
    container_name: redis-slave-1
    ports:
      - "6380:6380"
    command: redis-server --port 6380 --appendonly yes --replicaof redis-master 6379 --protected-mode no
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-net

  # --------------------------
  # Redis Slave 2 (Port: 6381)
  # --------------------------
  redis-slave-2:
    image: redis:7-alpine
    container_name: redis-slave-2
    ports:
      - "6381:6381"
    command: redis-server --port 6381 --appendonly yes --replicaof redis-master 6379 --protected-mode no
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-net

  # --------------------------
  # Redis Sentinel 1 (Port: 26379)
  # --------------------------
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    command: >
      sh -c "echo 'port 26379' > /tmp/sentinel.conf &&
      echo 'protected-mode no' >> /tmp/sentinel.conf &&
      echo 'sentinel announce-ip 127.0.0.1' >> /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster 172.20.0.10 6379 2' >> /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
    networks:
      - redis-net

  # --------------------------
  # Redis Sentinel 2 (Port: 26380)
  # --------------------------
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    ports:
      - "26380:26380"
    command: >
      sh -c "echo 'port 26380' > /tmp/sentinel.conf &&
      echo 'protected-mode no' >> /tmp/sentinel.conf &&
      echo 'sentinel announce-ip 127.0.0.1' >> /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster 172.20.0.10 6379 2' >> /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
    networks:
      - redis-net

  # --------------------------
  # Redis Sentinel 3 (Port: 26381)
  # --------------------------
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    ports:
      - "26381:26381"
    command: >
      sh -c "echo 'port 26381' > /tmp/sentinel.conf &&
      echo 'protected-mode no' >> /tmp/sentinel.conf &&
      echo 'sentinel announce-ip 127.0.0.1' >> /tmp/sentinel.conf &&
      echo 'sentinel monitor mymaster 172.20.0.10 6379 2' >> /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    depends_on:
      - redis-master
    networks:
      - redis-net

  # --------------------------
  # Broker 1 (Node ID: 1)
  # --------------------------
  kafka-1:
    image: apache/kafka:3.9.2
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      # listeners
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # replication configs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # [추가] JMX - Kafka 메트릭 수집용
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-1

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - kafka-net

  # --------------------------
  # Broker 2 (Node ID: 2)
  # --------------------------
  kafka-2:
    image: apache/kafka:3.9.2
    container_name: kafka-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      # listeners
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # replication configs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # [추가] JMX - Kafka 메트릭 수집용
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-2

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - kafka-net

  # --------------------------
  # Broker 3 (Node ID: 3)
  # --------------------------
  kafka-3:
    image: apache/kafka:3.9.2
    container_name: kafka-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      # listeners
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # replication configs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # [추가] JMX - Kafka 메트릭 수집용
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka-3

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - kafka-net

  # --------------------------
  # Kafka UI
  # --------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_CLUSTERS_0_METADATAPROVIDER: "KAFKA"
      DYNAMIC_CONFIG_ENABLED: true
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - kafka-net

  # --------------------------
  # [추가] Kafka JMX Exporter - kafka-1 (Port: 5556)
  # --------------------------
  kafka-1-jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-1-jmx-exporter
    ports:
      - "5556:5556"
    environment:
      JMX_HOST: kafka-1
      JMX_PORT: 9999
      EXPORTER_PORT: 5556
    volumes:
      - ./monitoring/kafka-jmx-config.yml:/opt/bitnami/jmx-exporter/config.yml
    depends_on:
      - kafka-1
    networks:
      - kafka-net

  # --------------------------
  # [추가] Kafka JMX Exporter - kafka-2 (Port: 5557)
  # --------------------------
  kafka-2-jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-2-jmx-exporter
    ports:
      - "5557:5556"
    environment:
      JMX_HOST: kafka-2
      JMX_PORT: 9999
      EXPORTER_PORT: 5556
    volumes:
      - ./monitoring/kafka-jmx-config.yml:/opt/bitnami/jmx-exporter/config.yml
    depends_on:
      - kafka-2
    networks:
      - kafka-net

  # --------------------------
  # [추가] Kafka JMX Exporter - kafka-3 (Port: 5558)
  # --------------------------
  kafka-3-jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-3-jmx-exporter
    ports:
      - "5558:5556"
    environment:
      JMX_HOST: kafka-3
      JMX_PORT: 9999
      EXPORTER_PORT: 5556
    volumes:
      - ./monitoring/kafka-jmx-config.yml:/opt/bitnami/jmx-exporter/config.yml
    depends_on:
      - kafka-3
    networks:
      - kafka-net

  # --------------------------
  # Prometheus (메트릭 수집)
  # --------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9095:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - kafka-1-jmx-exporter
      - kafka-2-jmx-exporter
      - kafka-3-jmx-exporter
    networks:
      - kafka-net

  # --------------------------
  # Grafana (시각화 대시보드)
  # --------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kafka-net

  # --------------------------
  # PostgreSQL + pgvector (AI 벡터 스토어용)
  # --------------------------
  postgres-vector:
    image: pgvector/pgvector:pg16   # pgvector 익스텐션이 내장된 공식 이미지
    container_name: postgres-vector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: novelcraft_vectors   # DB 자동 생성
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data                              # 벡터 데이터 영속
      - ./init/pgvector-init.sh:/docker-entrypoint-initdb.d/pgvector-init.sh  # 최초 기동 시 자동 실행
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d novelcraft_vectors" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pgvector-net

volumes:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  prometheus_data:
  grafana_data:
  pgvector_data:    # PGVector 데이터 영속 볼륨

networks:
  kafka-net:
    driver: bridge
  redis-net:
    driver: bridge
  pgvector-net:
    driver: bridge