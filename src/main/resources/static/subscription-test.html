<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정기 구독 테스트</title>
    <!-- PortOne SDK -->
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
            display: none;
        }

        .response.error {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .response pre {
            margin: 10px 0 0 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 14px;
        }

        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }

        .info strong {
            color: #1976d2;
        }

        .subscription-info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .subscription-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-active {
            background: #4caf50;
            color: white;
        }

        .status-pending {
            background: #ff9800;
            color: white;
        }

        .status-cancelled {
            background: #f44336;
            color: white;
        }

        /* 로그인 화면 */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #667eea;
            text-align: center;
        }

        .login-card p {
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
            text-align: center;
        }

        .quick-btn {
            width: 100%;
            padding: 16px;
            background: #f8f7ff;
            border: 2px solid #e0e0ff;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all .15s;
            margin-bottom: 20px;
        }

        .quick-btn:hover {
            background: #ede9ff;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .quick-btn strong {
            display: block;
            font-size: 18px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .quick-btn span {
            font-size: 13px;
            color: #666;
        }

        #appScreen {
            display: none;
        }

        #appScreen.show {
            display: block;
        }

        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f3f0ff;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 30px;
        }

        .user-bar span {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
            font-weight: 600;
        }

        .btn-logout:hover {
            border-color: #f44336;
            color: #f44336;
        }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>🎯 정기 구독 테스트</h2>
            <p>한예린 계정으로 빠르게 로그인하세요</p>

            <div class="quick-btn" onclick="quickLogin()">
                <strong>📚 한예린</strong>
                <span>mentee@test.com<br>비밀번호: asdf1234</span>
            </div>

            <div id="loginError" style="color:#ef4444;font-size:13px;text-align:center;display:none;"></div>
        </div>
    </div>

    <!-- 앱 화면 -->
    <div id="appScreen">
        <div class="container">
            <h1>🎯 정기 구독 테스트</h1>

            <!-- 유저 정보 바 -->
            <div class="user-bar">
                <span id="userInfo">로그인 중...</span>
                <button class="btn-logout" onclick="doLogout()">로그아웃</button>
            </div>

            <!-- 1. 구독 준비 -->
            <div class="section">
                <h2>1️⃣ 구독 준비 (Prepare)</h2>
                <div class="form-group">
                    <label>플랜 타입</label>
                    <select id="planType">
                        <option value="PREMIUM">PREMIUM</option>
                        <option value="BASIC">BASIC</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>구독 금액 (원)</label>
                    <input type="number" id="amount" value="9900" min="1000">
                </div>
                <button onclick="prepareSubscription()">구독 준비</button>
                <div id="prepareResponse" class="response"></div>
            </div>

            <!-- 2. 빌링키 발급 (PortOne SDK) -->
            <div class="section">
                <h2>2️⃣ 빌링키 발급 (PortOne SDK)</h2>
                <div class="info">
                    <strong>subscriptionKey:</strong> <span id="displaySubscriptionKey">준비 단계 완료 후 표시됩니다</span>
                </div>
                <button onclick="issueBillingKey()" id="issueBillingBtn" disabled>빌링키 발급</button>
                <div id="billingKeyResponse" class="response"></div>
            </div>

            <!-- 3. 구독 완료 -->
            <div class="section">
                <h2>3️⃣ 구독 완료 (Complete)</h2>
                <div class="info">
                    <strong>billingKey:</strong> <span id="displayBillingKey">빌링키 발급 후 표시됩니다</span>
                </div>
                <button onclick="completeSubscription()" id="completeBtn" disabled>구독 완료</button>
                <div id="completeResponse" class="response"></div>
            </div>

            <!-- 4. 내 구독 조회 -->
            <div class="section">
                <h2>4️⃣ 내 구독 조회</h2>
                <button onclick="getMySubscription()">내 구독 조회</button>
                <div id="mySubscriptionResponse" class="response"></div>
            </div>

            <!-- 5. 구독 취소 -->
            <div class="section">
                <h2>5️⃣ 구독 취소</h2>
                <div class="form-group">
                    <label>구독 ID</label>
                    <input type="number" id="cancelSubscriptionId" placeholder="구독 조회에서 확인">
                </div>
                <div class="form-group">
                    <label>취소 사유 (선택)</label>
                    <input type="text" id="cancelReason" placeholder="서비스 불만족">
                </div>
                <button onclick="cancelSubscription()">구독 취소</button>
                <div id="cancelResponse" class="response"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        const STORE_ID = 'store-6dd586c4-bbae-4fc5-a1b1-920f1850b300';
        const CHANNEL_KEY = 'channel-key-c03d6f4b-9ca1-4554-944b-60f0b81848ea';  // 토스페이먼츠 정기결제 채널

        let token = null;
        let userNickname = null;
        let userEmail = null;
        let userPhone = null;
        let subscriptionKey = null;
        let billingKey = null;

        // ═══════════════════════════════════════
        // 로그인 / 로그아웃
        // ═══════════════════════════════════════
        async function quickLogin() {
            const email = 'mentee@test.com';
            const password = 'asdf1234';
            const errEl = document.getElementById('loginError');

            errEl.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    errEl.textContent = data.message || '로그인에 실패했습니다.';
                    errEl.style.display = 'block';
                    return;
                }

                token = data.data.accessToken;
                userNickname = data.data.nickname;
                userEmail = data.data.email;

                // 한예린 계정의 휴대폰 번호 (DB data.sql 참고)
                userPhone = '01011110006';

                document.getElementById('userInfo').textContent = `${userNickname} (${userEmail}) 님 환영합니다`;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').classList.add('show');

            } catch (error) {
                errEl.textContent = '서버에 연결할 수 없습니다.';
                errEl.style.display = 'block';
            }
        }

        function doLogout() {
            token = null;
            userNickname = null;
            userEmail = null;
            userPhone = null;
            subscriptionKey = null;
            billingKey = null;

            document.getElementById('appScreen').classList.remove('show');
            document.getElementById('loginScreen').style.display = 'flex';

            // 모든 응답 초기화
            document.querySelectorAll('.response').forEach(el => el.style.display = 'none');
            document.getElementById('issueBillingBtn').disabled = true;
            document.getElementById('completeBtn').disabled = true;
            document.getElementById('displaySubscriptionKey').textContent = '준비 단계 완료 후 표시됩니다';
            document.getElementById('displayBillingKey').textContent = '빌링키 발급 후 표시됩니다';
        }

        // ═══════════════════════════════════════
        // 응답 표시 헬퍼
        // ═══════════════════════════════════════
        function showResponse(elementId, data, isError = false) {
            const el = document.getElementById(elementId);
            el.className = `response ${isError ? 'error' : ''}`;
            el.style.display = 'block';
            el.innerHTML = `
                <strong>${isError ? '❌ 오류' : '✅ 성공'}</strong>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
        }

        // ═══════════════════════════════════════
        // 1. 구독 준비
        // ═══════════════════════════════════════
        async function prepareSubscription() {
            try {
                const planType = document.getElementById('planType').value;
                const amount = parseInt(document.getElementById('amount').value);

                const response = await fetch(`${API_BASE_URL}/api/subscriptions/prepare`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({ planType, amount })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    subscriptionKey = data.data.subscriptionKey;
                    document.getElementById('displaySubscriptionKey').textContent = subscriptionKey;
                    document.getElementById('issueBillingBtn').disabled = false;
                    showResponse('prepareResponse', data);
                } else {
                    showResponse('prepareResponse', data, true);
                }
            } catch (error) {
                showResponse('prepareResponse', { error: error.message }, true);
            }
        }

        // ═══════════════════════════════════════
        // 2. 빌링키 발급 (PortOne SDK)
        // ═══════════════════════════════════════
        async function issueBillingKey() {
            try {
                if (!subscriptionKey) {
                    alert('먼저 구독 준비를 완료해주세요');
                    return;
                }

                // PortOne SDK 호출
                const response = await PortOne.requestIssueBillingKey({
                    storeId: STORE_ID,
                    channelKey: CHANNEL_KEY,
                    isTestChannel: true,  // ⭐ 테스트 채널 명시
                    billingKeyMethod: 'CARD',
                    issueId: subscriptionKey,
                    issueName: 'NovelCraft 정기 구독',
                    customer: {
                        customerId: subscriptionKey,
                        fullName: userNickname,
                        email: userEmail,
                        phoneNumber: userPhone
                    }
                });

                if (response.code != null) {
                    // 오류 발생
                    showResponse('billingKeyResponse', {
                        error: response.message,
                        code: response.code
                    }, true);
                    return;
                }

                // 성공
                billingKey = response.billingKey;
                document.getElementById('displayBillingKey').textContent = billingKey;
                document.getElementById('completeBtn').disabled = false;

                showResponse('billingKeyResponse', {
                    billingKey: response.billingKey,
                    message: '빌링키 발급 성공'
                });

            } catch (error) {
                showResponse('billingKeyResponse', { error: error.message }, true);
            }
        }

        // ═══════════════════════════════════════
        // 3. 구독 완료
        // ═══════════════════════════════════════
        async function completeSubscription() {
            try {
                if (!subscriptionKey || !billingKey) {
                    alert('먼저 구독 준비와 빌링키 발급을 완료해주세요');
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/api/subscriptions/complete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({
                        subscriptionKey: subscriptionKey,
                        billingKey: billingKey
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResponse('completeResponse', data);
                    // 자동으로 내 구독 조회
                    setTimeout(() => getMySubscription(), 1000);
                } else {
                    showResponse('completeResponse', data, true);
                }
            } catch (error) {
                showResponse('completeResponse', { error: error.message }, true);
            }
        }

        // ═══════════════════════════════════════
        // 4. 내 구독 조회
        // ═══════════════════════════════════════
        async function getMySubscription() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/subscriptions/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': token
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // 구독 정보 표시
                    const sub = data.data;
                    const statusClass = sub.status === 'ACTIVE' ? 'status-active' :
                                       sub.status === 'PENDING' ? 'status-pending' : 'status-cancelled';

                    const html = `
                        <strong>✅ 성공</strong>
                        <div class="subscription-info">
                            <h3>📋 구독 정보</h3>
                            <div class="info-item">
                                <span class="info-label">구독 ID</span>
                                <span class="info-value">${sub.id}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">상태</span>
                                <span class="status-badge ${statusClass}">${sub.status}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">플랜</span>
                                <span class="info-value">${sub.planType}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">금액</span>
                                <span class="info-value">${sub.amount?.toLocaleString()}원</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">시작일</span>
                                <span class="info-value">${new Date(sub.startedAt).toLocaleString('ko-KR')}</span>
                            </div>
                            ${sub.nextBillingAt ? `
                            <div class="info-item">
                                <span class="info-label">다음 청구일</span>
                                <span class="info-value">${new Date(sub.nextBillingAt).toLocaleString('ko-KR')}</span>
                            </div>
                            ` : ''}
                            ${sub.endedAt ? `
                            <div class="info-item">
                                <span class="info-label">종료일</span>
                                <span class="info-value">${new Date(sub.endedAt).toLocaleString('ko-KR')}</span>
                            </div>
                            ` : ''}
                        </div>
                    `;

                    document.getElementById('mySubscriptionResponse').innerHTML = html;
                    document.getElementById('mySubscriptionResponse').className = 'response';
                    document.getElementById('mySubscriptionResponse').style.display = 'block';

                    // 취소용 ID 자동 입력
                    document.getElementById('cancelSubscriptionId').value = sub.id;
                } else {
                    showResponse('mySubscriptionResponse', data, true);
                }
            } catch (error) {
                showResponse('mySubscriptionResponse', { error: error.message }, true);
            }
        }

        // ═══════════════════════════════════════
        // 5. 구독 취소
        // ═══════════════════════════════════════
        async function cancelSubscription() {
            try {
                const subscriptionId = document.getElementById('cancelSubscriptionId').value;
                const reason = document.getElementById('cancelReason').value;

                if (!subscriptionId) {
                    alert('구독 ID를 입력해주세요');
                    return;
                }

                if (!confirm('정말 구독을 취소하시겠습니까?')) {
                    return;
                }

                const response = await fetch(`${API_BASE_URL}/api/subscriptions/${subscriptionId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({ reason: reason || null })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResponse('cancelResponse', data);
                    // 자동으로 내 구독 조회
                    setTimeout(() => getMySubscription(), 1000);
                } else {
                    showResponse('cancelResponse', data, true);
                }
            } catch (error) {
                showResponse('cancelResponse', { error: error.message }, true);
            }
        }
    </script>
</body>
</html>
