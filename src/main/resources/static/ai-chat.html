<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NovelCraft · AI 고객센터</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0e0e10;
            --surface: #18181c;
            --surface2:#1f1f24;
            --border:  #2a2a30;
            --accent:  #e8c97a;
            --accent2: #7a8ce8;
            --text:    #e8e6e0;
            --muted:   #6b6a65;
            --success: #6fcf97;
            --error:   #eb5757;
            --user-bubble: #2a2a40;
            --ai-bubble:   #1f1f24;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── 헤더 ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .brand {
            font-family: 'Noto Serif KR', serif;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 0.04em;
        }
        .brand span {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-left: 10px;
            letter-spacing: 0.1em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #userName {
            font-size: 12px;
            color: var(--muted);
        }

        .btn-sm {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all .2s;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm.danger:hover { border-color: var(--error); color: var(--error); }

        /* ── 로그인 화면 ── */
        #loginView {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 20px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            letter-spacing: 0.05em;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
        .form-group input {
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus { border-color: var(--accent); }

        .btn-login {
            padding: 12px;
            background: var(--accent);
            color: #1a1500;
            border: none;
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity .2s;
            margin-top: 4px;
        }
        .btn-login:hover { opacity: 0.88; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        #loginError {
            font-size: 11px;
            color: var(--error);
            text-align: center;
            min-height: 16px;
        }

        /* ── 채팅 화면 ── */
        #chatView {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        /* 메시지 영역 */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* 환영 메시지 */
        .welcome-msg {
            text-align: center;
            padding: 32px 20px;
            color: var(--muted);
        }
        .welcome-msg .icon { font-size: 36px; margin-bottom: 12px; }
        .welcome-msg p { font-size: 13px; line-height: 1.7; }
        .welcome-msg strong { color: var(--accent); }

        /* 메시지 행 */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 76%;
        }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai   { align-self: flex-start; }

        /* 아바타 */
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .avatar.ai   { background: var(--accent); color: #1a1500; }
        .avatar.user { background: var(--accent2); color: #fff; }

        /* 버블 */
        .bubble {
            padding: 11px 16px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-row.user .bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }
        .msg-row.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* 타이핑 인디케이터 */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 6px; height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ── 입력 영역 ── */
        .input-bar {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #msgInput {
            flex: 1;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            transition: border-color .2s;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.5;
        }
        #msgInput:focus { border-color: var(--accent2); }
        #msgInput::placeholder { color: var(--muted); }

        .btn-send {
            padding: 10px 18px;
            background: var(--accent2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: opacity .2s;
            white-space: nowrap;
            align-self: flex-end;
        }
        .btn-send:hover { opacity: 0.85; }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

        .input-hint {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            padding-bottom: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
    <div class="brand">
        NovelCraft
        <span>AI 고객센터</span>
    </div>
    <div class="header-right">
        <span id="userName"></span>
        <button class="btn-sm danger" id="resetBtn" onclick="resetSession()" style="display:none">대화 초기화</button>
        <button class="btn-sm" id="logoutBtn" onclick="logout()" style="display:none">로그아웃</button>
    </div>
</header>

<!-- ── 로그인 화면 ── -->
<div id="loginView">
    <div class="login-card">
        <div>
            <div class="login-title">AI 고객센터</div>
            <div class="login-sub" style="margin-top:6px">로그인 후 이용하실 수 있습니다</div>
        </div>

        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="passwordInput" placeholder="비밀번호 입력" autocomplete="current-password"/>
        </div>

        <div id="loginError"></div>

        <button class="btn-login" id="loginBtn" onclick="login()">로그인</button>
    </div>
</div>

<!-- ── 채팅 화면 ── -->
<div id="chatView">
    <div id="messages">
        <div class="welcome-msg">
            <div class="icon">✦</div>
            <p>
                <strong>NovelCraft AI 고객센터</strong>에 오신 걸 환영합니다.<br/>
                결제, 구독, 포인트, 멘토링 등 궁금한 점을 물어보세요.
            </p>
        </div>
    </div>

    <div class="input-bar">
        <textarea id="msgInput" placeholder="질문을 입력하세요... (Shift+Enter 줄바꿈)" rows="1"
                  onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">전송 ▶</button>
    </div>
    <div class="input-hint">AI 답변은 FAQ 문서를 기반으로 제공됩니다 · 문서에 없는 내용은 고객센터로 문의해 주세요</div>
</div>

<script>
    // ── 상태 ──────────────────────────────────────────────
    let token = null;
    let isStreaming = false;

    // ── 초기화 ────────────────────────────────────────────
    (function init() {
        const saved = sessionStorage.getItem('accessToken');
        if (saved) {
            token = saved;
            showChat();
        }
    })();

    // ── Enter 키 로그인 ───────────────────────────────────
    document.getElementById('passwordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });

    // ── 로그인 ───────────────────────────────────────────
    async function login() {
        const email    = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errEl    = document.getElementById('loginError');
        const btn      = document.getElementById('loginBtn');

        if (!email || !password) {
            errEl.textContent = '이메일과 비밀번호를 입력해 주세요.';
            return;
        }

        btn.disabled = true;
        btn.textContent = '로그인 중...';
        errEl.textContent = '';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const json = await res.json();

            if (!res.ok) {
                errEl.textContent = json.message || '로그인에 실패했습니다.';
                return;
            }

            token = json.data.accessToken;
            sessionStorage.setItem('accessToken', token);
            showChat(json.data.email || email);

        } catch (e) {
            errEl.textContent = '서버에 연결할 수 없습니다.';
        } finally {
            btn.disabled = false;
            btn.textContent = '로그인';
        }
    }

    // ── 화면 전환 ─────────────────────────────────────────
    function showChat(email) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('chatView').style.display  = 'flex';
        document.getElementById('resetBtn').style.display  = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        if (email) document.getElementById('userName').textContent = email;
        document.getElementById('msgInput').focus();
    }

    function showLogin() {
        document.getElementById('chatView').style.display  = 'none';
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('resetBtn').style.display  = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('userName').textContent    = '';
    }

    // ── 로그아웃 ──────────────────────────────────────────
    function logout() {
        token = null;
        sessionStorage.removeItem('accessToken');
        document.getElementById('messages').innerHTML = `
            <div class="welcome-msg">
                <div class="icon">✦</div>
                <p><strong>NovelCraft AI 고객센터</strong>에 오신 걸 환영합니다.<br/>
                결제, 구독, 포인트, 멘토링 등 궁금한 점을 물어보세요.</p>
            </div>`;
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
        showLogin();
    }

    // ── 대화 세션 초기화 ──────────────────────────────────
    async function resetSession() {
        try {
            await fetch('/api/ai-support/chat/session', {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            const messagesEl = document.getElementById('messages');
            messagesEl.innerHTML = `
                <div class="welcome-msg">
                    <div class="icon">✦</div>
                    <p><strong>대화가 초기화되었습니다.</strong><br/>새로운 질문을 입력해 주세요.</p>
                </div>`;
        } catch (e) {
            console.error('세션 초기화 실패', e);
        }
    }

    // ── 메시지 전송 ───────────────────────────────────────
    async function sendMessage() {
        if (isStreaming) return;

        const input = document.getElementById('msgInput');
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        autoResize(input);

        // 사용자 메시지 추가
        appendUserMsg(message);

        // AI 버블 (스트리밍용 빈 버블 생성)
        const aiBubble = appendAIMsg();

        isStreaming = true;
        document.getElementById('sendBtn').disabled = true;

        let fullText = '';

        try {
            const response = await fetch('/api/ai-support/chat', {
                method: 'POST',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                body: JSON.stringify({ message })
            });

            if (response.status === 401) {
                aiBubble.textContent = '세션이 만료되었습니다. 다시 로그인해 주세요.';
                logout();
                return;
            }

            // SSE 스트림을 ReadableStream으로 읽기
            const reader  = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer    = '';

            aiBubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // 청크를 누적 버퍼에 추가
                buffer += decoder.decode(value, { stream: true });

                // 완성된 SSE 이벤트(\n\n 기준) 파싱
                const events = buffer.split('\n\n');
                buffer = events.pop(); // 마지막은 불완전할 수 있으므로 보류

                for (const event of events) {
                    for (const line of event.split('\n')) {
                        if (line.startsWith('data:')) {
                            const token = line.slice(5); // 'data:' 이후 텍스트
                            if (token === '[DONE]') break;
                            fullText += token;
                            aiBubble.textContent = fullText;
                            scrollToBottom();
                        }
                    }
                }
            }

            // 버퍼에 남은 마지막 조각 처리
            if (buffer && buffer.startsWith('data:')) {
                const last = buffer.slice(5);
                if (last && last !== '[DONE]') {
                    fullText += last;
                    aiBubble.textContent = fullText;
                }
            }

            if (!fullText) {
                aiBubble.textContent = '응답을 받지 못했습니다. 다시 시도해 주세요.';
            }

        } catch (e) {
            console.error('SSE 오류', e);
            // 서버 측 async dispatch 에러로 연결이 끊겨도
            // 이미 응답을 받은 경우에는 에러 메시지로 덮지 않음
            if (!fullText) {
                aiBubble.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
            }
        } finally {
            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('msgInput').focus();
        }
    }

    // ── DOM 헬퍼 ──────────────────────────────────────────
    function appendUserMsg(text) {
        const messagesEl = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `
            <div class="avatar user">나</div>
            <div class="bubble">${escHtml(text)}</div>`;
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function appendAIMsg() {
        const messagesEl = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row ai';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        row.innerHTML = `<div class="avatar ai">AI</div>`;
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        scrollToBottom();
        return bubble;
    }

    function scrollToBottom() {
        const el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    // ── 입력창 자동 높이 ──────────────────────────────────
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── 키보드 단축키 ─────────────────────────────────────
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }
</script>
</body>
</html>
