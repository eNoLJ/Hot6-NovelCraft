<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알림 테스트 - NovelCraft</title>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

    /* ── 헤더 ── */
    .header {
      background: #7c3aed; color: #fff; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .ws-status {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .ws-status.connected    { background: #d1fae5; color: #065f46; }
    .ws-status.disconnected { background: #fee2e2; color: #991b1b; }
    .ws-status.connecting   { background: #fef3c7; color: #92400e; }
    .btn-logout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    /* ── 로그인 화면 ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 52px); background: #f0f2f5;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 360px;
    }
    .login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #4c1d95; }
    .login-card p  { font-size: 13px; color: #888; margin-bottom: 24px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 13px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #7c3aed; }
    .quick-accounts { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-btn {
      flex: 1; min-width: 120px; padding: 8px; background: #faf5ff;
      border: 1px solid #e9d5ff; border-radius: 8px; cursor: pointer;
      font-size: 12px; text-align: center; transition: all .15s;
    }
    .quick-btn:hover { background: #f3e8ff; border-color: #7c3aed; }
    .quick-btn strong { display: block; font-size: 13px; color: #7c3aed; margin-bottom: 2px; }
    .btn-primary {
      width: 100%; padding: 12px; background: #7c3aed; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { background: #c4b5fd; cursor: not-allowed; }
    .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }

    /* ── 앱 화면 ── */
    #appScreen { display: none; }

    /* ── 메인 컨테이너 ── */
    .main { max-width: 760px; margin: 30px auto; padding: 0 16px; }

    /* ── 요약 카드 ── */
    .summary-row {
      display: flex; gap: 14px; margin-bottom: 20px;
    }
    .summary-card {
      flex: 1; background: #fff; border-radius: 14px;
      padding: 20px 22px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex; align-items: center; gap: 14px;
    }
    .summary-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .summary-icon.purple { background: #f3e8ff; }
    .summary-icon.red    { background: #fee2e2; }
    .summary-label { font-size: 12px; color: #888; margin-bottom: 2px; }
    .summary-value { font-size: 24px; font-weight: 700; color: #1e1b4b; }

    /* ── 액션 바 ── */
    .action-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .action-bar h2 { font-size: 16px; font-weight: 700; color: #374151; }
    .btn-secondary {
      padding: 8px 16px; background: #fff; border: 1.5px solid #e9d5ff;
      border-radius: 8px; color: #7c3aed; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .btn-secondary:hover { background: #faf5ff; }
    .btn-refresh-icon {
      padding: 8px 12px; background: #fff; border: 1.5px solid #e5e7eb;
      border-radius: 8px; color: #6b7280; font-size: 14px;
      cursor: pointer; transition: all .15s;
    }
    .btn-refresh-icon:hover { background: #f9fafb; }

    /* ── 실시간 토스트 ── */
    #toastArea { position: fixed; top: 70px; right: 20px; width: 320px; z-index: 999; }
    .toast {
      background: #fff; border-radius: 12px; padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 10px;
      border-left: 4px solid #7c3aed; animation: slideIn .3s ease;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .toast-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .toast-title { font-size: 13px; font-weight: 600; color: #1e1b4b; margin-bottom: 3px; }
    .toast-msg   { font-size: 12px; color: #6b7280; }
    @keyframes slideIn {
      from { transform: translateX(340px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }

    /* ── 알림 목록 ── */
    .notification-list { display: flex; flex-direction: column; gap: 10px; }

    .noti-item {
      background: #fff; border-radius: 12px; padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; transition: all .15s; position: relative;
      border-left: 4px solid transparent;
    }
    .noti-item.unread { border-left-color: #7c3aed; background: #faf5ff; }
    .noti-item:hover  { box-shadow: 0 4px 14px rgba(0,0,0,0.1); transform: translateY(-1px); }

    .noti-icon-wrap {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .noti-body { flex: 1; min-width: 0; }
    .noti-title-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px;
    }
    .noti-title  { font-size: 14px; font-weight: 600; color: #1e1b4b; }
    .noti-time   { font-size: 11px; color: #9ca3af; flex-shrink: 0; margin-left: 8px; }
    .noti-msg    { font-size: 13px; color: #6b7280; line-height: 1.4; }
    .unread-dot  {
      width: 8px; height: 8px; border-radius: 50%; background: #7c3aed;
      flex-shrink: 0; margin-top: 6px;
    }

    /* 타입별 색상 */
    .icon-POINT_CHARGE       { background: #d1fae5; }
    .icon-PAYMENT_SUCCESS    { background: #dbeafe; }
    .icon-PAYMENT_FAILED     { background: #fee2e2; }
    .icon-SUBSCRIPTION_ACTIVATED { background: #f3e8ff; }
    .icon-SUBSCRIPTION_CANCELLED { background: #fef3c7; }
    .icon-EPISODE_PURCHASE   { background: #e0f2fe; }
    .icon-NOVEL_BULK_PURCHASE { background: #e0f2fe; }
    .icon-AUTHOR_REVENUE     { background: #d1fae5; }
    .icon-MENTORSHIP_REQUEST { background: #fce7f3; }
    .icon-MENTORSHIP_ACCEPTED { background: #d1fae5; }
    .icon-EPISODE_PUBLISHED  { background: #fef3c7; }
    .icon-default            { background: #f3f4f6; }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: #9ca3af;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    /* ── 페이지네이션 ── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 24px;
    }
    .page-btn {
      padding: 8px 14px; border-radius: 8px; border: 1.5px solid #e5e7eb;
      background: #fff; color: #374151; font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover    { border-color: #7c3aed; color: #7c3aed; }
    .page-btn.active   { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 로딩 ── */
    .loading-spinner {
      text-align: center; padding: 40px; color: #9ca3af; font-size: 14px;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1>🔔 NovelCraft 알림 테스트</h1>
  <div class="header-right">
    <span id="userNickname" style="font-size:14px;"></span>
    <span class="ws-status disconnected" id="wsStatus">● 연결 끊김</span>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-card">
    <h2>로그인</h2>
    <p>알림을 확인하려면 먼저 로그인하세요.</p>

    <div class="quick-accounts">
      <div class="quick-btn" onclick="quickLogin('reader1@test.com','asdf1234')">
        <strong>박지훈 (독자)</strong>reader1@test.com
      </div>
      <div class="quick-btn" onclick="quickLogin('author1@test.com','asdf1234')">
        <strong>김도윤 (작가)</strong>author1@test.com
      </div>
      <div class="quick-btn" onclick="quickLogin('mentor@test.com','asdf1234')">
        <strong>정민준 (멘토)</strong>mentor@test.com
      </div>
      <div class="quick-btn" onclick="quickLogin('mentee@test.com','asdf1234')">
        <strong>한예린 (멘티)</strong>mentee@test.com
      </div>
    </div>

    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="email@test.com" />
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPassword" placeholder="asdf1234"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 앱 화면 -->
<div id="appScreen">
  <div id="toastArea"></div>
  <div class="main">

    <!-- 요약 카드 -->
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-icon purple">🔔</div>
        <div>
          <div class="summary-label">전체 알림</div>
          <div class="summary-value" id="totalCount">0</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon red">📌</div>
        <div>
          <div class="summary-label">읽지 않은 알림</div>
          <div class="summary-value" id="unreadCount">0</div>
        </div>
      </div>
    </div>

    <!-- 액션 바 -->
    <div class="action-bar">
      <h2>알림 목록</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" onclick="markAllRead()">모두 읽음 처리</button>
        <button class="btn-refresh-icon" onclick="loadNotifications(1)" title="새로고침">↺</button>
      </div>
    </div>

    <!-- 알림 목록 -->
    <div id="notiList" class="notification-list">
      <div class="loading-spinner">불러오는 중...</div>
    </div>

    <!-- 페이지네이션 -->
    <div id="pagination" class="pagination"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  상태 변수
// ──────────────────────────────────────────
let token      = null;
let myUserId   = null;
let myNickname = null;
let stompClient = null;
let currentPage = 1;
let totalPages  = 1;

// ──────────────────────────────────────────
//  빠른 로그인
// ──────────────────────────────────────────
function quickLogin(email, pw) {
  document.getElementById('loginEmail').value = email;
  document.getElementById('loginPassword').value = pw;
  doLogin();
}

// ──────────────────────────────────────────
//  로그인
// ──────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl    = document.getElementById('loginError');
  const btnEl    = document.getElementById('loginBtn');

  if (!email || !password) { showLoginError('이메일과 비밀번호를 입력하세요.'); return; }
  errEl.style.display = 'none';
  btnEl.disabled = true;
  btnEl.textContent = '로그인 중...';

  try {
    const res = await api('/api/auth/login', 'POST', { email, password }, false);
    token     = res.data.accessToken;
    myNickname = res.data.nickname;

    const me  = await api('/api/auth/users/me');
    const d   = me.data || {};
    myUserId  = Number(d.uerId ?? d.userId ?? d.id ?? 0) || null;

    document.getElementById('userNickname').textContent = myNickname;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display  = 'block';

    await loadNotifications(1);
    await loadUnreadCount();
    connectWs();
  } catch (e) {
    showLoginError(e.message || '로그인에 실패했습니다.');
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = '로그인';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ──────────────────────────────────────────
//  로그아웃
// ──────────────────────────────────────────
function doLogout() {
  disconnectWs();
  token = myUserId = myNickname = null;
  document.getElementById('appScreen').style.display  = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('userNickname').textContent = '';
}

// ──────────────────────────────────────────
//  WebSocket (STOMP)
// ──────────────────────────────────────────
function setWsStatus(state) {
  const el = document.getElementById('wsStatus');
  el.className = `ws-status ${state}`;
  el.textContent = state === 'connected'    ? '● 실시간 연결'
                 : state === 'connecting'   ? '● 연결 중...'
                 : '● 연결 끊김';
}

function connectWs() {
  disconnectWs();
  setWsStatus('connecting');

  stompClient = new StompJs.Client({
    brokerURL: `ws://${location.host}/ws-chat`,
    connectHeaders: { Authorization: token },
    reconnectDelay: 5000,
    onConnect: () => {
      setWsStatus('connected');

      if (!myUserId) {
        console.error('[WS] myUserId가 없어 알림 구독 불가');
        return;
      }

      // 내 알림 구독
      stompClient.subscribe(`/topic/notifications/${myUserId}`, frame => {
        const noti = JSON.parse(frame.body);
        showToast(noti);
        loadNotifications(currentPage);
        loadUnreadCount();
      });
    },
    onDisconnect: () => setWsStatus('disconnected'),
    onStompError: () => setWsStatus('disconnected'),
  });

  stompClient.activate();
}

function disconnectWs() {
  if (stompClient) { stompClient.deactivate(); stompClient = null; }
  setWsStatus('disconnected');
}

// ──────────────────────────────────────────
//  알림 목록 조회
// ──────────────────────────────────────────
async function loadNotifications(page = 1) {
  currentPage = page;
  const listEl = document.getElementById('notiList');
  listEl.innerHTML = '<div class="loading-spinner">불러오는 중...</div>';

  try {
    const res  = await api(`/api/notifications?page=${page}&size=10`);
    const data = res.data;
    totalPages = data.totalPages || 1;

    document.getElementById('totalCount').textContent = data.totalElements ?? 0;

    renderList(data.content || []);
    renderPagination(page, totalPages);
  } catch (e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderList(items) {
  const listEl = document.getElementById('notiList');

  if (!items.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔕</div>
        <p>알림이 없습니다.</p>
      </div>`;
    return;
  }

  listEl.innerHTML = items.map(n => {
    const read = n.isRead ?? n.read ?? false;
    return `
    <div class="noti-item ${read ? '' : 'unread'}" onclick="markRead(${n.id}, this)">
      <div class="noti-icon-wrap ${iconClass(n.type)}">${typeIcon(n.type)}</div>
      <div class="noti-body">
        <div class="noti-title-row">
          <span class="noti-title">${escHtml(n.title)}</span>
          <span class="noti-time">${formatTime(n.createdAt)}</span>
        </div>
        <div class="noti-msg">${escHtml(n.content)}</div>
      </div>
      ${read ? '' : '<div class="unread-dot"></div>'}
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────
//  읽지 않은 수 조회
// ──────────────────────────────────────────
async function loadUnreadCount() {
  try {
    const res = await api('/api/notifications/unread-count');
    document.getElementById('unreadCount').textContent = res.data?.count ?? 0;
  } catch (_) {}
}

// ──────────────────────────────────────────
//  읽음 처리 (개별)
// ──────────────────────────────────────────
async function markRead(id, el) {
  if (!el.classList.contains('unread')) return; // 이미 읽음 → 요청 생략
  try {
    await api(`/api/notifications/${id}/read`, 'PATCH');
    el.classList.remove('unread');
    const dot = el.querySelector('.unread-dot');
    if (dot) dot.remove();
    await loadUnreadCount();
  } catch (e) {
    console.warn('읽음 처리 실패:', e.message);
  }
}

// ──────────────────────────────────────────
//  전체 읽음 처리
// ──────────────────────────────────────────
async function markAllRead() {
  try {
    await api('/api/notifications/read-all', 'PATCH');
    document.getElementById('unreadCount').textContent = '0';
    // 목록에서 unread 스타일 제거
    document.querySelectorAll('.noti-item.unread').forEach(el => {
      el.classList.remove('unread');
      const dot = el.querySelector('.unread-dot');
      if (dot) dot.remove();
    });
  } catch (e) {
    alert('전체 읽음 처리에 실패했습니다: ' + e.message);
  }
}

// ──────────────────────────────────────────
//  페이지네이션 렌더
// ──────────────────────────────────────────
function renderPagination(current, total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  const pages = [];
  pages.push(`<button class="page-btn" onclick="loadNotifications(${current-1})" ${current===1?'disabled':''}>◀</button>`);

  const start = Math.max(1, current - 2);
  const end   = Math.min(total, current + 2);
  for (let p = start; p <= end; p++) {
    pages.push(`<button class="page-btn ${p===current?'active':''}" onclick="loadNotifications(${p})">${p}</button>`);
  }

  pages.push(`<button class="page-btn" onclick="loadNotifications(${current+1})" ${current===total?'disabled':''}>▶</button>`);
  el.innerHTML = pages.join('');
}

// ──────────────────────────────────────────
//  실시간 토스트
// ──────────────────────────────────────────
function showToast(noti) {
  const area = document.getElementById('toastArea');
  const div  = document.createElement('div');
  div.className = 'toast';
  div.innerHTML = `
    <div class="toast-icon">${typeIcon(noti.type)}</div>
    <div>
      <div class="toast-title">${escHtml(noti.title)}</div>
      <div class="toast-msg">${escHtml(noti.content)}</div>
    </div>`;
  area.prepend(div);

  // 5초 후 자동 제거
  setTimeout(() => div.remove(), 5000);
}

// ──────────────────────────────────────────
//  유틸
// ──────────────────────────────────────────
function typeIcon(type) {
  const map = {
    POINT_CHARGE:           '💰',
    PAYMENT_SUCCESS:        '✅',
    PAYMENT_FAILED:         '❌',
    SUBSCRIPTION_ACTIVATED: '⭐',
    SUBSCRIPTION_CANCELLED: '🚫',
    EPISODE_PURCHASE:       '📖',
    NOVEL_BULK_PURCHASE:    '📚',
    AUTHOR_REVENUE:         '💵',
    MENTORSHIP_REQUEST:     '🙋',
    MENTORSHIP_ACCEPTED:    '🤝',
    EPISODE_PUBLISHED:      '🆕',
    PAYMENT:                '💳',
    NEW_EPISODE:            '📢',
    LIKE:                   '❤️',
    FOLLOW:                 '👤',
    MENTORSHIP:             '🎓',
    SYSTEM:                 '⚙️',
  };
  return map[type] || '🔔';
}

function iconClass(type) {
  const map = {
    POINT_CHARGE:           'icon-POINT_CHARGE',
    PAYMENT_SUCCESS:        'icon-PAYMENT_SUCCESS',
    PAYMENT_FAILED:         'icon-PAYMENT_FAILED',
    SUBSCRIPTION_ACTIVATED: 'icon-SUBSCRIPTION_ACTIVATED',
    SUBSCRIPTION_CANCELLED: 'icon-SUBSCRIPTION_CANCELLED',
    EPISODE_PURCHASE:       'icon-EPISODE_PURCHASE',
    NOVEL_BULK_PURCHASE:    'icon-NOVEL_BULK_PURCHASE',
    AUTHOR_REVENUE:         'icon-AUTHOR_REVENUE',
    MENTORSHIP_REQUEST:     'icon-MENTORSHIP_REQUEST',
    MENTORSHIP_ACCEPTED:    'icon-MENTORSHIP_ACCEPTED',
    EPISODE_PUBLISHED:      'icon-EPISODE_PUBLISHED',
  };
  return map[type] || 'icon-default';
}

function formatTime(iso) {
  if (!iso) return '';
  const d    = new Date(iso);
  const now  = new Date();
  const diff = Math.floor((now - d) / 1000);

  if (diff < 60)   return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  return d.toLocaleDateString('ko-KR', { month:'long', day:'numeric' });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ──────────────────────────────────────────
//  API 공통 헬퍼
// ──────────────────────────────────────────
async function api(url, method = 'GET', body = null, useToken = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (useToken && token) headers['Authorization'] = token;

  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  const res  = await fetch(url, opts);
  const data = await res.json();

  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}
